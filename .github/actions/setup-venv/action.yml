name: Python uv environment
description: Set up a uv-managed Python environment
inputs:
  python-version:
    description: The Python version to use
    required: true
  cache-prefix:
    description: Update this to invalidate the cache
    required: true
    default: v0
  save-cache:
    description: Whether to save the uv cache after the job
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ inputs.python-version }}
        enable-cache: true
        cache-dependency-glob: uv.lock
        cache-suffix: ${{ inputs.cache-prefix }}-py${{ inputs.python-version }}
        save-cache: ${{ inputs.save-cache }}

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - shell: bash
      run: |
        uv sync --extra dev --frozen --python ${{ inputs.python-version }}

    - shell: bash
      run: |
        echo "✓ Installed $(uv run python --version) environment"
        echo "Packages:"
        uv tree --depth 1
